<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>virendra portfolio</title>
        <style>
            *{
                padding: 0;
                margin: 0;
            }
            body{
                background-color: rgb(20, 18, 18);
                color: white;
            }

                nav
                {
                    display: flex;
                    justify-content: space-around;
                    align-items: center;
                        height: 60px;
                        background-color: rgb(10, 15, 41);
                }
              nav  ul{
                    display: flex;
                    justify-content: center;

                }
               nav ul li{ list-style: none;
                margin: 0 23px;
                }
                nav ul li a{
                    text-decoration: none;
                    color: white;
                }
                nav ul li a:hover{
                    color: rgb(158, 40, 91);
                    font-size: 1.01rem;
                                }
                .left_logo{
                    font-size: 1.5rem;
                    
                }

                .first_section{
                    display: flex;
                    justify-content: space-around;
                    margin: 80px 0;
                    align-items:start;
                }
                .first_section > div{
                    width: 30%;
                }
                .left_section{
                   background-color: transparent;
                   font-size: 2rem;
                  margin: 70px 0;
                     
                }
                .right_section{
                    background-color:transparent;
                    
                }
               .right_section img{
                    
                    height: 500px;
                    margin: 20px 0;
                }
                .purple{
                    color: rgb(99, 7, 192);
                }


            
                
                .project_heading{
                    text-align: center;
                    margin: 50px 0;
                    color: rgb(255, 251, 0);
                    text-shadow: 1px 1px red;
                }
            </style>
</head>

<body>
    <header>
        <nav>
            <div class="left_logo">VIRENDRA'S PORTFOLIO</div>
            <div class="right_nav">
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/">About</a></li>
                    <li><a href="/">Projects</a></li>
                    <li><a href="/">Contact</a></li>
                </ul>

            </div>
        </nav>
    </header>

    <main>
        <section class="first_section">
            <div class="left_section"> 
                Hi, My name is <span class="purple">Virendra </span>
                <div>and I am a Web Developer</div>
            </div>
            <div class="right_section">
                <img src="/portfolio/assets/img/developer image .png" alt="image" >
            </div>
        </section>
        <section class="second_section">
            <div class="project_heading">
                <h1>PROJECTS</h1>
            </div>
            <div class="projects_area">
                

            </div>
        </section>
    </main>
</body>
</html>
